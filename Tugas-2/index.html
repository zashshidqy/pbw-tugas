<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2 - Dashboard Login</title>
    <link href="https://fonts.googleapis.com/css?family=Poppins" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-form">
         <form action="" method="">
            <label for="username" id="usr">Username</label>
            <br>
            <input class="form-isi" type="text" name="username" placeholder=" Masukkan nama pengguna">
            <br>
            <label  for="email">Email</label>
            <br>
            <input class="form-isi" type="text" name="email" placeholder=" Masukkan email">
            <br>
            <label for="jenis-kelamin">Jenis Kelamin</label>
            <br>
            <input type="radio" name="jenis-kelamin">Laki-Laki
            <input type="radio" name="jenis-kelamin">Perempuan
            <br>
            <label for="hobi">Hobi</label>
            <br>
            <input type="checkbox" value="musik">Musik
            <input type="checkbox" value="olahraga">Olahraga
            <br>
            <label for="kota">Pilih kota</label>
            <select name="cars" id="cars">
                <option value="volvo">Karawang</option>
                <option value="saab">Jakarta</option>
                <option value="mercedes">Bandung</option>
                <option value="audi">Bali</option>
            </select>
            <br>
            <label for="file">Upload foto</label>
            <input type="file" name="file">
            <br>
            <button type="submit">Daftar</button>
        </form>
    </div>
</body>
</html>
